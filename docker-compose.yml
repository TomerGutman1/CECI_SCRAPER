services:
  gov2db-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: gov2db-scraper:latest
    container_name: gov2db-scraper

    restart: unless-stopped

    # Secrets from .env file (GEMINI_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, etc.)
    env_file:
      - .env

    # Non-secret defaults
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./healthcheck:/app/healthcheck
      - ./new_tags.md:/app/new_tags.md:ro
      - ./new_departments.md:/app/new_departments.md:ro

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
